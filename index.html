<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vote — RCFC</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1a3260 0%, #0d1f3c 60%);
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }
    .hero img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #C8A84B;
      box-shadow: 0 0 32px #C8A84B44;
      margin-bottom: 18px;
    }
    .hero h1 {
      color: #C8A84B;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .hero p {
      color: #8fa8c8;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(to right, transparent, #C8A84B, transparent);
      margin: 16px auto;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 560px;
      padding: 0 20px;
    }

    .choice-card {
      background: #162847;
      border: 1.5px solid #1e3a5f;
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .choice-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, #C8A84B18 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .choice-card:hover { border-color: #C8A84B; transform: translateY(-4px); box-shadow: 0 12px 32px #C8A84B22; }
    .choice-card:hover::before { opacity: 1; }

    .choice-card .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1e3a5f, #0d1f3c);
      border: 1.5px solid #C8A84B44;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }
    .choice-card .card-icon svg { color: #C8A84B; }

    .choice-card h2 {
      font-size: 0.95rem;
      font-weight: 800;
      color: #C8A84B;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .choice-card p {
      font-size: 0.8rem;
      color: #8fa8c8;
      line-height: 1.5;
    }

    .choice-card .arrow {
      margin-top: 18px;
      color: #C8A84B44;
      transition: color 0.2s, transform 0.2s;
      display: flex;
      justify-content: center;
    }
    .choice-card:hover .arrow { color: #C8A84B; transform: translateX(4px); }

    @media(max-width: 480px) {
      .choice-grid { grid-template-columns: 1fr; max-width: 320px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="assets/logo.jpg" alt="Logo RCFC"/>
    <h1>Espace Vote</h1>
    <p>Ramonville Coteaux Football Club</p>
    <div class="divider"></div>
  </div>

  <div class="choice-grid">

    <a href="ca.html" class="choice-card">
      <div class="card-icon">
        <i data-lucide="shield-check" width="28" height="28"></i>
      </div>
      <h2>Comité Directeur</h2>
      <p>Réservé aux 16 membres du comité d'administration</p>
      <div class="arrow"><i data-lucide="arrow-right" width="18" height="18"></i></div>
    </a>

    <a href="ag.html" class="choice-card">
      <div class="card-icon">
        <i data-lucide="users" width="28" height="28"></i>
      </div>
      <h2>Assemblée Générale</h2>
      <p>Vote ouvert à tous les membres du club</p>
      <div class="arrow"><i data-lucide="arrow-right" width="18" height="18"></i></div>
    </a>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
