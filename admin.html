<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Vote — RCFC</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { background: #0d1f3c; }
    header { background: #0d1f3c; border-bottom: 2px solid #C8A84B33; }
    header h1 { color: #C8A84B; }
    header p  { color: #8fa8c8; }

    main { max-width: 960px; margin: 32px auto; padding: 0 16px 80px; }

    /* MDP */
    .mdp-panel {
      background: #162847; border: 2px solid #1e3a5f; border-radius: 18px;
      padding: 40px 32px; text-align: center; max-width: 360px; margin: 60px auto 0;
    }
    .mdp-panel .lock { font-size: 2.8rem; margin-bottom: 16px; }
    .mdp-panel h2 { color: #C8A84B; font-size: 1.1rem; margin-bottom: 6px; }
    .mdp-panel p  { color: #8fa8c8; font-size: 0.85rem; margin-bottom: 24px; }
    .mdp-input {
      width: 100%; padding: 12px 16px; border: 2px solid #1e3a5f;
      border-radius: 10px; background: #0d1f3c; color: #fff;
      font-size: 1rem; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 14px;
    }
    .mdp-input:focus { border-color: #C8A84B; }
    .mdp-error { color: #fc8181; font-size: 0.85rem; margin-top: 8px; display: none; }

    /* Admin layout */
    .admin-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 24px; margin-top: 24px; }
    @media(max-width:700px){ .admin-grid { grid-template-columns: 1fr; } }

    .panel {
      background: #162847; border: 1.5px solid #1e3a5f;
      border-radius: 16px; padding: 22px;
    }
    .panel h3 {
      font-size: 0.9rem; font-weight: 700; color: #C8A84B;
      text-transform: uppercase; letter-spacing: 1px;
      border-bottom: 1px solid #1e3a5f; padding-bottom: 10px; margin-bottom: 16px;
    }

    label { display: block; font-size: 0.82rem; font-weight: 600; color: #8fa8c8; margin: 12px 0 4px; }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%; padding: 9px 12px; border: 1.5px solid #1e3a5f;
      border-radius: 8px; background: #0d1f3c; color: #fff; font-size: 0.95rem;
      outline: none; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: #C8A84B; }
    textarea { resize: vertical; min-height: 60px; }
    select option { background: #0d1f3c; }

    .btn-gold {
      background: #C8A84B; color: #0d1f3c; border: none; border-radius: 10px;
      padding: 11px; font-size: 0.95rem; font-weight: 800;
      cursor: pointer; width: 100%; margin-top: 14px; transition: opacity 0.2s;
    }
    .btn-gold:hover { opacity: 0.85; }

    .btn-sm-green  { background: #276749; color: #fff; border: none; border-radius: 7px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
    .btn-sm-red    { background: #9b2c2c; color: #fff; border: none; border-radius: 7px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
    .btn-sm-grey   { background: #2d3748; color: #8fa8c8; border: 1px solid #4a5568; border-radius: 7px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; }

    /* Res cards admin */
    .res-admin {
      background: #0d1f3c; border: 1.5px solid #1e3a5f; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .res-admin.open { border-color: #C8A84B55; }
    .res-admin-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .res-admin-num  { font-size: 0.72rem; color: #8fa8c8; font-weight: 700; text-transform: uppercase; }
    .res-admin-titre { font-weight: 700; color: #fff; margin: 3px 0 8px; font-size: 0.95rem; }
    .res-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* Barres résultats */
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .bar-label { width: 90px; font-size: 0.78rem; color: #8fa8c8; }
    .bar-track { flex: 1; background: #1e3a5f; border-radius: 4px; height: 8px; }
    .bar-fill  { height: 8px; border-radius: 4px; }
    .bar-count { font-size: 0.78rem; font-weight: 700; color: #fff; min-width: 20px; }

    .vote-total { font-size: 0.75rem; color: #4a5568; margin-top: 6px; }

    .session-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .session-row select { flex: 1; }

    .badge-open   { background: #1a472a; color: #48bb78; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-closed { background: #4a1a1a; color: #fc8181; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }

    .user-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: #162847; border-radius: 10px; padding: 12px 18px;
      margin-bottom: 20px; font-size: 0.88rem; color: #C8A84B; font-weight: 700;
      border: 1px solid #C8A84B33;
    }
    .btn-logout { background: transparent; border: 1.5px solid #8fa8c8; color: #8fa8c8; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; }
    .btn-logout:hover { border-color: #C8A84B; color: #C8A84B; }

    .empty-state { text-align: center; padding: 40px 20px; color: #4a5568; }
    #toast { background: #C8A84B; color: #0d1f3c; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚙️ Administration — RCFC Vote</h1>
    <p><a href="index.html" style="color:#8fa8c8;text-decoration:none;">← Retour à l'accueil</a></p>
  </div>
</header>

<main>

  <!-- MDP -->
  <div id="mdp-section" class="mdp-panel">
    <div class="lock">🔐</div>
    <h2>Accès administrateur</h2>
    <p>Entrez le mot de passe admin</p>
    <input class="mdp-input" type="password" id="mdp-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkMdpAdmin()"/>
    <button class="btn-gold" id="btn-mdp" onclick="checkMdpAdmin()">Accéder →</button>
    <div class="mdp-error" id="mdp-error">Mot de passe incorrect</div>
  </div>

  <!-- Panel admin -->
  <div id="admin-panel" style="display:none;">

    <div class="user-bar">
      <span>⚙️ Administration RCFC</span>
      <button class="btn-logout" onclick="logoutAdmin()">Déconnexion</button>
    </div>

    <div class="admin-grid">

      <!-- COLONNE GAUCHE -->
      <div>
        <div class="panel" style="margin-bottom:20px;">
          <h3>Nouvelle session</h3>
          <label>Titre</label>
          <input type="text" id="s-titre" placeholder="CA Juin 2026"/>
          <label>Type</label>
          <select id="s-type">
            <option value="CA">Comité Directeur</option>
            <option value="AG">Assemblée Générale</option>
          </select>
          <button class="btn-gold" onclick="createSession()">+ Créer la session</button>
        </div>

        <div class="panel">
          <h3>Ajouter une résolution</h3>
          <label>Session</label>
          <select id="r-session"></select>
          <label>N° résolution</label>
          <input type="number" id="r-numero" value="1" min="1"/>
          <label>Titre</label>
          <input type="text" id="r-titre" placeholder="Approbation du bilan financier"/>
          <label>Description (optionnel)</label>
          <textarea id="r-desc" placeholder="Détails..."></textarea>
          <button class="btn-gold" onclick="createResolution()">+ Ajouter</button>
        </div>
      </div>

      <!-- COLONNE DROITE -->
      <div class="panel">
        <h3>Résolutions & Résultats</h3>
        <div class="session-row">
          <select id="view-session" onchange="loadAdminRes()"></select>
          <button class="btn-sm-grey" onclick="refreshAdmin()">↻</button>
        </div>
        <div id="session-toggle" style="display:none;margin-bottom:14px;display:flex;gap:8px;"></div>
        <div id="admin-res-list"><div class="empty-state"><p>Sélectionnez une session</p></div></div>
      </div>

    </div>
  </div>

</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
