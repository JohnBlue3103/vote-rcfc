<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assemblée Générale — RCFC</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { background: #0d1f3c; }
    main { max-width: 680px; margin: 32px auto; padding: 0 16px 80px; }

    /* ── Code d'accès ── */
    .code-panel {
      background: #162847; border: 2px solid #1e3a5f; border-radius: 18px;
      padding: 40px 32px; text-align: center; max-width: 360px; margin: 60px auto 0;
    }
    .code-panel h2 { color: #C8A84B; font-size: 1.1rem; margin-bottom: 6px; }
    .code-panel p  { color: #8fa8c8; font-size: 0.85rem; margin-bottom: 24px; }
    .code-input {
      width: 100%; padding: 12px 16px; border: 2px solid #1e3a5f;
      border-radius: 10px; background: #0d1f3c; color: #fff;
      font-size: 1.1rem; outline: none; text-align: center;
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px;
    }
    .code-input:focus { border-color: #C8A84B; }
    .code-error { color: #fc8181; font-size: 0.85rem; margin-top: 8px; display: none; }

    .btn-gold {
      background: #C8A84B; color: #0d1f3c; border: none; border-radius: 10px;
      padding: 13px 32px; font-size: 1rem; font-weight: 800;
      cursor: pointer; width: 100%; transition: opacity 0.2s;
    }
    .btn-gold:hover { opacity: 0.88; }

    /* ── User bar ── */
    .user-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: #162847; border-radius: 10px; padding: 12px 18px;
      margin-bottom: 20px; border: 1px solid #C8A84B33;
    }
    .user-bar-name { color: #C8A84B; font-weight: 700; font-size: 0.95rem; }
    .user-bar-sub  { color: #8fa8c8; font-size: 0.78rem; margin-top: 2px; }
    .btn-logout { background: transparent; border: 1.5px solid #8fa8c8; color: #8fa8c8; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; }
    .btn-logout:hover { border-color: #C8A84B; color: #C8A84B; }

    /* ── Onglets ── */
    .ag-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .ag-tab {
      padding: 10px 24px; border-radius: 10px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; border: 1.5px solid #1e3a5f; color: #8fa8c8; background: #162847;
      transition: all 0.15s;
    }
    .ag-tab.active { background: #C8A84B; color: #0d1f3c; border-color: #C8A84B; }

    /* ── Documents ── */
    .doc-card {
      display: flex; align-items: center; gap: 14px;
      background: #162847; border: 1.5px solid #1e3a5f; border-radius: 12px;
      padding: 16px; margin-bottom: 10px; text-decoration: none; color: #fff;
      transition: border-color 0.2s;
    }
    .doc-card:hover { border-color: #C8A84B; }
    .doc-icon { font-size: 1.6rem; flex-shrink: 0; }
    .doc-info h4 { color: #fff; font-size: 0.92rem; font-weight: 700; margin-bottom: 3px; }
    .doc-info p  { color: #8fa8c8; font-size: 0.78rem; }

    /* ── Session bar ── */
    .session-bar {
      background: #162847; border: 1px solid #C8A84B33; border-radius: 12px;
      padding: 14px 20px; margin-bottom: 20px; display: none;
    }
    .session-bar-titre { color: #C8A84B; font-weight: 700; font-size: 1rem; }
    .session-bar-sub   { color: #8fa8c8; font-size: 0.8rem; margin-top: 2px; }

    /* ── Résolutions ── */
    .res-card {
      background: #162847; border: 1.5px solid #1e3a5f; border-radius: 16px;
      padding: 22px; margin-bottom: 14px;
    }
    .res-card.voted { border-color: #C8A84B44; }
    .res-num   { font-size: 0.75rem; color: #8fa8c8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .res-titre { font-size: 1rem; font-weight: 700; color: #fff; margin: 6px 0 10px; }
    .res-desc  { font-size: 0.88rem; color: #8fa8c8; margin-bottom: 16px; line-height: 1.5; }
    .type-badge { background: #1e3a5f; color: #8fa8c8; border-radius: 6px; padding: 2px 8px; font-size: 0.7rem; font-weight: 600; }
    .vote-row  { display: flex; gap: 10px; }
    .vbtn {
      flex: 1; padding: 11px 6px; border: 2px solid transparent; border-radius: 10px;
      font-weight: 700; font-size: 0.88rem; cursor: pointer;
      background: #1a3260; color: #8fa8c8; transition: all 0.15s;
    }
    .vbtn:hover { transform: translateY(-1px); }
    .vbtn.pour.sel,       .vbtn.pour:hover       { background: #1a472a; border-color: #48bb78; color: #48bb78; }
    .vbtn.contre.sel,     .vbtn.contre:hover     { background: #4a1a1a; border-color: #fc8181; color: #fc8181; }
    .vbtn.abstention.sel, .vbtn.abstention:hover { background: #2d2a1a; border-color: #f6e05e; color: #f6e05e; }
    .confirm-row { display: none; gap: 10px; margin-top: 12px; }
    .confirm-row.show { display: flex; }
    .btn-ok     { flex: 1; background: #C8A84B; color: #0d1f3c; border: none; border-radius: 8px; padding: 10px; font-weight: 800; cursor: pointer; }
    .btn-cancel { background: transparent; border: 1.5px solid #8fa8c8; color: #8fa8c8; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-weight: 600; }
    .voted-tag  { display: inline-block; padding: 5px 14px; border-radius: 999px; font-size: 0.82rem; font-weight: 700; }
    .voted-tag.voted { background: #1a3260; color: #C8A84B; border: 1px solid #C8A84B44; }
    .closed-label { color: #4a5568; font-size: 0.88rem; font-style: italic; }

    /* ── Récapitulatif ── */
    .chrono-toggle {
      display: flex; align-items: center; justify-content: space-between;
      background: #162847; border: 1.5px solid #1e3a5f; border-radius: 12px;
      padding: 14px 20px; cursor: pointer; margin-top: 32px; margin-bottom: 0;
      color: #C8A84B; font-weight: 700; font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .chrono-toggle:hover { border-color: #C8A84B44; }
    .chrono-session { background: #162847; border: 1.5px solid #1e3a5f; border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
    .chrono-header  { padding: 16px 20px; border-bottom: 1px solid #1e3a5f; display: flex; justify-content: space-between; align-items: center; }
    .chrono-date    { color: #C8A84B; font-size: 0.82rem; font-weight: 700; }
    .chrono-titre   { color: #fff; font-weight: 700; margin-top: 3px; }
    .chrono-res     { padding: 14px 20px; }
    .chrono-item    { display: flex; flex-direction: column; gap: 6px; padding: 10px 0; border-bottom: 1px solid #1e3a5f22; }
    .chrono-item:last-child { border-bottom: none; }
    .chrono-item-titre { color: #cbd5e0; font-size: 0.88rem; }
    .result-pill   { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
    .result-adopte { background: #1a472a; color: #48bb78; }
    .result-rejete { background: #4a1a1a; color: #fc8181; }

    .empty-state { text-align: center; padding: 50px 20px; color: #4a5568; }
    .empty-state h3 { color: #8fa8c8; margin-bottom: 8px; }
    #toast { background: #C8A84B; color: #0d1f3c; }
  </style>
</head>
<body>

<header style="display:flex;align-items:center;gap:14px;padding:14px 24px;background:#0d1f3c;border-bottom:2px solid #C8A84B33;">
  <img src="assets/logo.jpg" alt="Logo RCFC" style="height:48px;width:48px;border-radius:50%;border:3px solid #C8A84B;"/>
  <div>
    <h1 style="color:#C8A84B;font-size:1.05rem;font-weight:900;letter-spacing:1px;">Assemblée Générale — RCFC</h1>
    <p><a href="index.html" style="color:#8fa8c8;text-decoration:none;font-size:0.82rem;">← Retour à l'accueil</a></p>
  </div>
</header>

<main>

  <!-- Saisie du code adhérent -->
  <div id="code-section" class="code-panel">
    <div style="display:flex;justify-content:center;margin-bottom:16px;">
      <i data-lucide="key-round" width="44" height="44" style="color:#C8A84B;"></i>
    </div>
    <h2>Accès Assemblée Générale</h2>
    <p>Entrez votre code adhérent personnel</p>
    <input class="code-input" type="text" id="code-input" maxlength="12" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') verifyCodeAg()"/>
    <button class="btn-gold" id="btn-code" onclick="verifyCodeAg()">Accéder →</button>
    <div class="code-error" id="code-error">Code adhérent non reconnu</div>
  </div>

  <!-- Interface principale (après connexion) -->
  <div id="main-section" style="display:none;">

    <div class="user-bar">
      <div>
        <div class="user-bar-name">🏟️ <span id="ag-membre-nom"></span></div>
        <div class="user-bar-sub">Vote anonyme — Assemblée Générale RCFC</div>
      </div>
      <button class="btn-logout" onclick="logoutAg()">Déconnexion</button>
    </div>

    <div class="ag-tabs">
      <button class="ag-tab" id="tab-docs" onclick="switchAgTab('docs')">
        📄 Documents AG
      </button>
      <button class="ag-tab active" id="tab-vote" onclick="switchAgTab('vote')">
        🗳️ Vote
      </button>
    </div>

    <!-- Onglet Documents -->
    <div id="panel-docs" style="display:none;">
      <div id="ag-docs-list"><div class="empty-state"><h3>Chargement...</h3></div></div>
    </div>

    <!-- Onglet Vote -->
    <div id="panel-vote">
      <div id="ag-session-bar" class="session-bar">
        <div class="session-bar-titre" id="ag-session-titre"></div>
        <div class="session-bar-sub"   id="ag-session-presents"></div>
      </div>
      <div id="ag-res-list"></div>

      <!-- Récapitulatif des décisions passées -->
      <div class="chrono-toggle" onclick="toggleChrono(this)">
        <span>📊 Récapitulatif des décisions passées</span>
        <i data-lucide="chevron-down" width="18" height="18" id="chrono-chevron"></i>
      </div>
      <div id="ag-chrono-wrap" style="display:none;padding-top:14px;">
        <div id="ag-chrono-list"><div class="empty-state"><h3>Chargement...</h3></div></div>
      </div>
    </div>

  </div>

</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/ag.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
